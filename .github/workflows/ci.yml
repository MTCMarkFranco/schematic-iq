name: CI — Regression & Unit Tests

on:
  push:
    branches: [master, main, "chore/**", "feat/**"]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

jobs:
  test:
    name: Unit tests + smoke regression
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: python -m pytest services/stage1/tests/ -v

      - name: Run smoke regression
        run: python scripts/run_regression.py --suite smoke --strict
